<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YoloHome – Đăng nhập</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <i class="fas fa-house-signal" style="font-size:2.5rem;color:var(--accent)"></i>
      <h1>YoloHome</h1>
      <p>Smart Home Dashboard</p>
    </div>

    {% if error %}
    <div class="login-error">
      <i class="fas fa-circle-exclamation"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <div class="form-group">
        <label for="username"><i class="fas fa-user"></i> Tên đăng nhập</label>
        <input type="text" id="username" name="username"
               placeholder="admin" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Mật khẩu</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-right-to-bracket"></i> Đăng nhập
      </button>
    </form>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" />
  <style>
    .login-body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--bg);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 1.6rem; margin: 8px 0 4px; }
    .login-logo p  { color: var(--text-dim); font-size: .85rem; }
    .login-error {
      background: rgba(248,81,73,.12);
      color: var(--danger);
      border: 1px solid rgba(248,81,73,.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .85rem;
      margin-bottom: 16px;
    }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: .82rem; color: var(--text-dim); }
    .form-group input {
      background: var(--surface2);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .btn-login {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .88; }
  </style>
</body>
</html>
